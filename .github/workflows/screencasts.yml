name: Record Screencasts

on:
  workflow_dispatch:
    inputs:
      screencast:
        description: 'Screencast to record (e.g. workspace_deletion.py, or "all")'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  record:
    name: Record Screencasts
    runs-on: ubuntu-latest
    environment: screencasts
    env:
      DJANGO_SETTINGS_MODULE: sbomify.test_settings
      DEBUG: True
      DJANGO_TEST: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install JS dependencies and build frontend
        run: |
          bun install
          bun run build

      - name: Start Docker Compose for tests
        run: docker compose -f docker-compose.tests.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for DB..."
          elapsed=0
          until docker compose -f docker-compose.tests.yml exec -T db pg_isready -U sbomify_test -q 2>/dev/null; do
            sleep 1
            elapsed=$((elapsed + 1))
            if [ "$elapsed" -ge 120 ]; then
              echo "Timed out waiting for DB after 120s"
              docker compose -f docker-compose.tests.yml logs db || true
              exit 1
            fi
          done

          echo "Waiting for Redis..."
          elapsed=0
          until docker compose -f docker-compose.tests.yml exec -T redis redis-cli ping 2>/dev/null | grep -q "PONG"; do
            sleep 1
            elapsed=$((elapsed + 1))
            if [ "$elapsed" -ge 120 ]; then
              echo "Timed out waiting for Redis after 120s"
              docker compose -f docker-compose.tests.yml logs redis || true
              exit 1
            fi
          done

          echo "Waiting for Chromium CDP endpoint..."
          elapsed=0
          until docker compose -f docker-compose.tests.yml exec -T chromium curl -sf http://localhost:9222/json/version >/dev/null 2>&1; do
            sleep 1
            elapsed=$((elapsed + 1))
            if [ "$elapsed" -ge 120 ]; then
              echo "Timed out waiting for Chromium after 120s"
              docker compose -f docker-compose.tests.yml logs chromium || true
              exit 1
            fi
          done

          echo "All services ready."

      - name: Install Playwright ffmpeg
        run: |
          docker compose -f docker-compose.tests.yml exec -T tests \
            uv run playwright install ffmpeg

      - name: Record screencasts
        run: |
          INPUT="${{ github.event.inputs.screencast }}"

          # Validate input: must be "all", empty, or a safe Python filename (not conftest.py)
          if [[ -n "$INPUT" ]] && [[ "$INPUT" != "all" ]]; then
            if [[ ! "$INPUT" =~ ^[a-zA-Z0-9_-]+\.py$ ]]; then
              echo "Error: Invalid screencast name '$INPUT'. Must be 'all' or a filename like 'my_screencast.py'"
              exit 1
            fi
            if [[ "$INPUT" == "conftest.py" ]]; then
              echo "Error: 'conftest.py' is not a valid screencast target"
              exit 1
            fi
          fi

          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            echo "Recording all screencasts..."
            for file in screencasts/*.py; do
              [ -f "$file" ] || continue
              [[ "$(basename "$file")" == "conftest.py" ]] && continue
              BASENAME=$(basename "$file" .py)
              echo "--- Recording: $file ---"
              docker compose -f docker-compose.tests.yml exec -T tests \
                uv run pytest "$file" \
                  --override-ini="python_files=*.py" \
                  --override-ini="python_functions=$BASENAME" \
                  -s
            done
          else
            FILE="screencasts/$INPUT"
            if [ ! -f "$FILE" ]; then
              echo "Error: $FILE not found"
              exit 1
            fi
            BASENAME=$(basename "$FILE" .py)
            echo "Recording: $FILE"
            docker compose -f docker-compose.tests.yml exec -T tests \
              uv run pytest "$FILE" \
                --override-ini="python_files=*.py" \
                --override-ini="python_functions=$BASENAME" \
                -s
          fi

      - name: Clean temp videos and fix ownership
        if: always()
        run: |
          sudo chown -R $USER:$USER screencasts/output/ 2>/dev/null || true
          # Playwright writes temp files as 32-char hex hashes before the
          # fixture renames them; drop only those so named recordings
          # (including parametrized ones without a matching .py stem) stay.
          for webm in screencasts/output/*.webm; do
            [ -f "$webm" ] || continue
            name=$(basename "$webm" .webm)
            if [[ "$name" =~ ^[a-f0-9]{32}$ ]]; then
              rm -f "$webm"
            fi
          done

      - name: Upload to Cloudflare R2
        if: ${{ always() && env.R2_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 sync screencasts/output/ "s3://${R2_BUCKET}/screencasts/" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type video/webm \
            --cache-control "public, max-age=300" \
            --exclude "*" --include "*.webm" \
            --no-progress

          if [ -d screencasts/output/screenshots ]; then
            aws s3 sync screencasts/output/screenshots/ "s3://${R2_BUCKET}/screenshots/" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type image/png \
              --cache-control "public, max-age=300" \
              --exclude "*" --include "*.png" \
              --no-progress
          fi

      - name: Upload screencast recordings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screencasts
          path: screencasts/output/*.webm
          if-no-files-found: warn

      - name: Upload screencast screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshots
          path: screencasts/output/screenshots/
          if-no-files-found: warn

      - name: Stop Docker Compose services
        if: always()
        run: docker compose -f docker-compose.tests.yml down
